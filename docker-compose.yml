services:
  app:
    build:
      context: .
    container_name: stamp-duty-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:18080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: stamp_duty
      DB_USERNAME: stamp_duty
      DB_PASSWORD: stamp_duty
    ports:
      - "18080:8000"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor

  db:
    image: mariadb:11.4
    container_name: stamp-duty-db
    environment:
      MARIADB_DATABASE: stamp_duty
      MARIADB_USER: stamp_duty
      MARIADB_PASSWORD: stamp_duty
      MARIADB_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "33061:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  vendor: